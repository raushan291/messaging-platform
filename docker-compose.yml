version: "3.9"

services:

  redis:
    image: redis:7
    container_name: messaging-redis
    ports:
      - "6379:6379"
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  
  auth-postgres:
    image: postgres:15
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  messaging-postgres:
    image: postgres:15
    container_name: messaging-postgres
    environment:
      POSTGRES_DB: messaging_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5434:5432"
    volumes:
      - messaging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d messaging_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  auth-service:
    build: ./backend/services/auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://auth_user:auth_pass@auth-postgres:5432/auth_db
    depends_on:
      redis:
        condition: service_started
      auth-postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  messaging-service:
    build: ./backend/services/messaging-service
    container_name: messaging-service
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://auth_user:auth_pass@messaging-postgres:5432/messaging_db
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
      messaging-postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002

  frontend:
    build: ./frontend
    container_name: messaging-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_API: http://localhost:8001/api/v1
      NEXT_PUBLIC_MESSAGING_API: http://localhost:8002/api/v1
      NEXT_PUBLIC_WS_API: ws://localhost:8002/api/v1
    depends_on:
      - auth-service
      - messaging-service
    command: npm run dev
  
volumes:
  auth_postgres_data:
  messaging_postgres_data:
